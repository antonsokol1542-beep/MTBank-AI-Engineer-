# Production overlay — adds a Caddy reverse proxy with automatic HTTPS (Let's Encrypt).
#
# Runs the full stack (OpenWebUI + Pipelines + API) behind one HTTPS domain.
# Use together with the base compose file on your VM:
#
#   export DEMO_DOMAIN=your-name.duckdns.org      # free subdomain → your VM IP
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Caddy fetches and renews the TLS certificate automatically for $DEMO_DOMAIN.

services:
  caddy:
    image: caddy:2-alpine
    container_name: mtbank_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DEMO_DOMAIN=${DEMO_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - openwebui
    networks:
      - mtbank_net

volumes:
  caddy_data:
  caddy_config:
